<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="ERA-ANALYTICS Store Health Check - 12-Dimension Store Diagnostic Framework">
    <meta name="author" content="ERA-ANALYTICS - Erajaya Digital Region 5">
    <title>Store Health Check - ERA-ANALYTICS</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏥</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #667eea;
            --primary-dark: #534AB7;
            --success: #00D084;
            --warning: #FFA500;
            --danger: #FF4757;
            --dark: #1a1a2e;
            --gray-100: #f8f9fa;
            --gray-200: #e9ecef;
            --gray-300: #dee2e6;
            --gray-400: #ced4da;
            --gray-500: #adb5bd;
            --gray-600: #6c757d;
            --gray-700: #495057;
            --gray-800: #343a40;
            --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.12);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: var(--shadow-lg);
            overflow: hidden;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 30px;
            color: white;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        /* Store Info Section */
        .store-info {
            padding: 25px 30px;
            background: var(--gray-100);
            border-bottom: 1px solid var(--gray-300);
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
        }

        .info-field label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--gray-600);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .info-field input,
        .info-field select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--gray-300);
            border-radius: 8px;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            transition: border-color 0.2s;
        }

        .info-field input:focus,
        .info-field select:focus {
            outline: none;
            border-color: var(--primary);
        }

        /* Progress Bar */
        .progress-section {
            padding: 20px 30px;
            background: white;
            border-bottom: 1px solid var(--gray-300);
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .progress-text {
            font-size: 14px;
            color: var(--gray-700);
            font-weight: 600;
        }

        .progress-percent {
            font-size: 18px;
            font-weight: 700;
            color: var(--primary);
        }

        .progress-bar-container {
            height: 8px;
            background: var(--gray-200);
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary) 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.4s ease;
        }

        /* Tab Navigation */
        .tabs {
            display: flex;
            overflow-x: auto;
            background: white;
            border-bottom: 2px solid var(--gray-200);
            padding: 0 20px;
        }

        .tab {
            padding: 16px 20px;
            font-size: 13px;
            font-weight: 600;
            color: var(--gray-600);
            cursor: pointer;
            border-bottom: 3px solid transparent;
            white-space: nowrap;
            transition: all 0.2s;
            position: relative;
        }

        .tab:hover {
            color: var(--primary);
        }

        .tab.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }

        .tab.completed::after {
            content: '✓';
            position: absolute;
            top: 8px;
            right: 4px;
            width: 16px;
            height: 16px;
            background: var(--success);
            color: white;
            border-radius: 50%;
            font-size: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Content */
        .content {
            padding: 30px;
            min-height: 400px;
        }

        .section {
            display: none;
        }

        .section.active {
            display: block;
        }

        .section-title {
            font-size: 22px;
            font-weight: 700;
            color: var(--dark);
            margin-bottom: 8px;
        }

        .section-subtitle {
            font-size: 14px;
            color: var(--gray-600);
            margin-bottom: 25px;
        }

        /* Question */
        .question {
            margin-bottom: 30px;
        }

        .question-label {
            font-size: 15px;
            font-weight: 600;
            color: var(--gray-800);
            margin-bottom: 12px;
            display: block;
        }

        .question-helper {
            font-size: 13px;
            color: var(--gray-600);
            margin-bottom: 10px;
        }

        /* Radio Options */
        .radio-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .radio-option {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            border: 2px solid var(--gray-300);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .radio-option:hover {
            border-color: var(--primary);
            background: #f8f7ff;
        }

        .radio-option input[type="radio"] {
            margin-right: 12px;
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .radio-option.selected {
            border-color: var(--primary);
            background: #f8f7ff;
        }

        .option-text {
            flex: 1;
            font-size: 14px;
            color: var(--gray-800);
        }

        .option-score {
            font-size: 12px;
            font-weight: 600;
            color: var(--gray-500);
            padding: 4px 10px;
            background: var(--gray-100);
            border-radius: 12px;
        }

        /* Number Input */
        .number-input-wrapper {
            position: relative;
            max-width: 300px;
        }

        .number-input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--gray-300);
            border-radius: 8px;
            font-size: 16px;
            font-family: 'Inter', sans-serif;
        }

        .number-input:focus {
            outline: none;
            border-color: var(--primary);
        }

        /* Score Display */
        .score-display {
            margin-top: 15px;
            padding: 16px;
            background: linear-gradient(135deg, #f8f7ff 0%, #f0efff 100%);
            border-radius: 8px;
            border-left: 4px solid var(--primary);
        }

        .score-display-label {
            font-size: 12px;
            font-weight: 600;
            color: var(--gray-600);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        .score-display-value {
            font-size: 28px;
            font-weight: 700;
            color: var(--primary);
        }

        /* Section Score Card */
        .section-score-card {
            margin-top: 30px;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            color: white;
            text-align: center;
        }

        .section-score-label {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 8px;
        }

        .section-score-value {
            font-size: 48px;
            font-weight: 700;
        }

        .section-score-status {
            font-size: 14px;
            margin-top: 8px;
            padding: 6px 16px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            display: inline-block;
        }

        /* Navigation Buttons */
        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 40px;
            padding-top: 25px;
            border-top: 1px solid var(--gray-300);
        }

        .btn {
            padding: 12px 28px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }

        .btn-secondary {
            background: var(--gray-200);
            color: var(--gray-700);
        }

        .btn-secondary:hover {
            background: var(--gray-300);
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .btn-success {
            background: var(--success);
            color: white;
            font-size: 16px;
            padding: 14px 32px;
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 208, 132, 0.4);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Summary Section */
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .summary-card {
            padding: 20px;
            background: var(--gray-100);
            border-radius: 12px;
            border-left: 4px solid var(--primary);
        }

        .summary-card-title {
            font-size: 12px;
            font-weight: 600;
            color: var(--gray-600);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .summary-card-value {
            font-size: 32px;
            font-weight: 700;
            color: var(--dark);
        }

        .summary-card-subtitle {
            font-size: 13px;
            color: var(--gray-600);
            margin-top: 4px;
        }

        .summary-card.success {
            border-left-color: var(--success);
        }

        .summary-card.success .summary-card-value {
            color: var(--success);
        }

        .summary-card.warning {
            border-left-color: var(--warning);
        }

        .summary-card.warning .summary-card-value {
            color: var(--warning);
        }

        .summary-card.danger {
            border-left-color: var(--danger);
        }

        .summary-card.danger .summary-card-value {
            color: var(--danger);
        }

        .dimension-list {
            margin-top: 30px;
        }

        .dimension-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px;
            background: white;
            border: 1px solid var(--gray-300);
            border-radius: 8px;
            margin-bottom: 12px;
        }

        .dimension-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--gray-800);
        }

        .dimension-score {
            font-size: 20px;
            font-weight: 700;
        }

        .decision-section {
            margin-top: 30px;
            padding: 25px;
            background: linear-gradient(135deg, #f8f7ff 0%, #f0efff 100%);
            border-radius: 12px;
        }

        .decision-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--dark);
            margin-bottom: 16px;
        }

        .decision-buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        .decision-btn {
            padding: 16px;
            border-radius: 8px;
            text-align: center;
            font-weight: 700;
            color: white;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .decision-btn:hover {
            transform: translateY(-2px);
        }

        .decision-btn.keep {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
        }

        .decision-btn.improve {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
        }

        .decision-btn.relocate {
            background: linear-gradient(135deg, #30cfd0 0%, #330867 100%);
        }

        .decision-btn.close {
            background: linear-gradient(135deg, #ff4757 0%, #c81d2e 100%);
        }

        .decision-btn.selected {
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.3);
        }

        /* Responsive */
        @media (max-width: 900px) {
            .info-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            body {
                padding: 0;
                background: white;
            }

            .container {
                border-radius: 0;
                box-shadow: none;
                min-height: 100vh;
            }

            .header {
                padding: 20px 16px;
            }

            .header h1 {
                font-size: 22px;
            }

            .store-info {
                padding: 16px;
            }

            .info-grid {
                grid-template-columns: 1fr 1fr;
                gap: 12px;
            }

            .progress-section {
                padding: 14px 16px;
            }

            .content {
                padding: 20px 16px;
            }

            .section-title {
                font-size: 18px;
            }

            .summary-grid {
                grid-template-columns: 1fr 1fr;
                gap: 12px;
            }

            .decision-buttons {
                grid-template-columns: repeat(2, 1fr);
            }

            .tabs {
                padding: 0 8px;
            }

            .tab {
                padding: 12px 10px;
                font-size: 12px;
            }

            .nav-buttons {
                margin-top: 24px;
            }
        }

        @media (max-width: 480px) {
            .info-grid {
                grid-template-columns: 1fr;
            }

            .header h1 {
                font-size: 20px;
            }

            .summary-grid {
                grid-template-columns: 1fr;
            }

            .summary-card-value {
                font-size: 26px;
            }
        }

        /* Loading State */
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--gray-600);
        }

        .spinner {
            border: 3px solid var(--gray-300);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>

        // State Management
        let currentSection = 0;
        let responses = {};
        let sectionScores = {};

        // Populate store dropdown
        function populateStoreDropdown() {
            const sel = document.getElementById('storeSelect');
            // Group by cluster for optgroups
            const groups = { Critical: [], Recovery: [], Stable: [], Growth: [] };
            STORES.forEach(s => {
                const label = `${s.code} — ${s.name}`;
                groups[s.cluster] = groups[s.cluster] || [];
                groups[s.cluster].push({ value: s.code, label });
            });
            const order = ['Critical', 'Recovery', 'Stable', 'Growth'];
            order.forEach(cluster => {
                if (!groups[cluster] || !groups[cluster].length) return;
                const og = document.createElement('optgroup');
                og.label = `⚠️ ${cluster}`.replace('⚠️ Growth','✅ Growth').replace('⚠️ Stable','🟡 Stable');
                groups[cluster].forEach(item => {
                    const opt = document.createElement('option');
                    opt.value = item.value;
                    opt.textContent = item.label;
                    og.appendChild(opt);
                });
                sel.appendChild(og);
            });
        }

        // Auto-fill TSH when store is selected
        function onStoreChange() {
            const code = document.getElementById('storeSelect').value;
            const store = STORES.find(s => s.code === code);
            document.getElementById('tshField').value = store ? store.tsh : '';
            saveToLocalStorage();
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            // Set default date to today
            document.getElementById('assessmentDate').valueAsDate = new Date();

            populateStoreDropdown();
            renderTabs();
            renderSections();
            updateProgress();
            loadFromLocalStorage();
        });

        // Render Tabs
        function renderTabs() {
            const tabsContainer = document.getElementById('tabs');
            dimensions.forEach((dim, index) => {
                const tab = document.createElement('div');
                tab.className = 'tab';
                tab.textContent = `${dim.id}. ${dim.name}`;
                tab.onclick = () => goToSection(index);
                tabsContainer.appendChild(tab);
            });
            
            // Summary tab
            const summaryTab = document.createElement('div');
            summaryTab.className = 'tab';
            summaryTab.textContent = 'Summary';
            summaryTab.onclick = () => goToSection(dimensions.length);
            tabsContainer.appendChild(summaryTab);
            
            updateTabs();
        }

        // Render Sections
        function renderSections() {
            const contentContainer = document.getElementById('content');
            
            // Render dimension sections
            dimensions.forEach((dim, dimIndex) => {
                const section = document.createElement('div');
                section.className = 'section';
                section.id = `section-${dimIndex}`;
                
                let html = `
                    <div class="section-title">${dim.emoji} ${dim.title}</div>
                    <div class="section-subtitle">${dim.subtitle}</div>
                `;
                
                dim.questions.forEach((q, qIndex) => {
                    html += `
                        <div class="question">
                            <label class="question-label">${qIndex + 1}. ${q.label}</label>
                            ${q.helper ? `<div class="question-helper">${q.helper}</div>` : ''}
                            <div class="radio-group">
                    `;
                    
                    q.options.forEach((opt, optIndex) => {
                        const inputId = `${dim.id}_${q.id}_${optIndex}`;
                        html += `
                            <label class="radio-option" data-input="${inputId}">
                                <input type="radio" 
                                       name="${dim.id}_${q.id}" 
                                       value="${opt.score}"
                                       id="${inputId}"
                                       onchange="handleRadioChange(${dim.id}, '${q.id}', ${opt.score})">
                                <span class="option-text">${opt.text}</span>
                                <span class="option-score">${opt.score} pts</span>
                            </label>
                        `;
                    });
                    
                    html += `
                            </div>
                        </div>
                    `;
                });
                
                // Section score display
                html += `
                    <div class="section-score-card">
                        <div class="section-score-label">Section Score</div>
                        <div class="section-score-value" id="section-score-${dimIndex}">-</div>
                        <div class="section-score-status" id="section-status-${dimIndex}">Not completed</div>
                    </div>
                `;
                
                // Navigation buttons
                html += `
                    <div class="nav-buttons">
                        <button class="btn btn-secondary" onclick="previousSection()" ${dimIndex === 0 ? 'style="visibility:hidden"' : ''}>
                            ← Previous
                        </button>
                        <button class="btn btn-primary" onclick="nextSection()">
                            ${dimIndex === dimensions.length - 1 ? 'Go to Summary →' : 'Next →'}
                        </button>
                    </div>
                `;
                
                section.innerHTML = html;
                contentContainer.appendChild(section);
            });
            
            // Render summary section
            renderSummarySection();
            
            // Show first section
            goToSection(0);
        }

        // Render Summary Section
        function renderSummarySection() {
            const contentContainer = document.getElementById('content');
            const summarySection = document.createElement('div');
            summarySection.className = 'section';
            summarySection.id = `section-${dimensions.length}`;
            
            summarySection.innerHTML = `
                <div class="section-title">📊 Health Check Summary</div>
                <div class="section-subtitle">Overall Store Diagnostic Results</div>
                
                <div class="summary-grid">
                    <div class="summary-card" id="overall-card">
                        <div class="summary-card-title">Overall Health Score</div>
                        <div class="summary-card-value" id="overall-score">-</div>
                        <div class="summary-card-subtitle" id="overall-status">-</div>
                    </div>
                    <div class="summary-card">
                        <div class="summary-card-title">Dimensions Completed</div>
                        <div class="summary-card-value" id="completed-count">0/12</div>
                        <div class="summary-card-subtitle">Fill all sections</div>
                    </div>
                </div>
                
                <div class="dimension-list" id="dimension-scores-list"></div>
                
                <div class="decision-section">
                    <div class="decision-title">💡 Recommended Decision</div>
                    <div class="decision-buttons">
                        <div class="decision-btn keep" onclick="selectDecision('keep')">KEEP</div>
                        <div class="decision-btn improve" onclick="selectDecision('improve')">IMPROVE</div>
                        <div class="decision-btn relocate" onclick="selectDecision('relocate')">RELOCATE</div>
                        <div class="decision-btn close" onclick="selectDecision('close')">CLOSE</div>
                    </div>
                </div>
                
                <div class="nav-buttons">
                    <button class="btn btn-secondary" onclick="previousSection()">← Previous</button>
                    <button class="btn btn-success" onclick="submitForm()">✓ Submit Health Check</button>
                </div>
            `;
            
            contentContainer.appendChild(summarySection);
        }

        // Handle Radio Change
        function handleRadioChange(dimId, questionId, score) {
            // Store response
            if (!responses[dimId]) responses[dimId] = {};
            responses[dimId][questionId] = score;
            
            // Update UI for selected option
            const radioInputs = document.querySelectorAll(`input[name="${dimId}_${questionId}"]`);
            radioInputs.forEach(input => {
                const label = input.closest('.radio-option');
                if (input.checked) {
                    label.classList.add('selected');
                } else {
                    label.classList.remove('selected');
                }
            });
            
            // Calculate section score
            calculateSectionScore(dimId);
            
            // Save to localStorage
            saveToLocalStorage();
            
            // Update progress
            updateProgress();
        }

        // Calculate Section Score
        function calculateSectionScore(dimId) {
            const dimension = dimensions.find(d => d.id === dimId);
            if (!dimension) return;
            
            const dimResponses = responses[dimId] || {};
            const scores = Object.values(dimResponses);
            
            if (scores.length === 0) return;
            
            const sectionScore = Math.round(scores.reduce((a, b) => a + b, 0) / scores.length);
            sectionScores[dimId] = sectionScore;
            
            // Update display
            const scoreElement = document.getElementById(`section-score-${dimId - 1}`);
            const statusElement = document.getElementById(`section-status-${dimId - 1}`);
            
            if (scoreElement) {
                scoreElement.textContent = sectionScore;
                
                let status = '';
                if (sectionScore >= 80) status = 'Excellent';
                else if (sectionScore >= 60) status = 'Good - Need Improvement';
                else status = 'Critical - Urgent Action';
                
                statusElement.textContent = status;
            }
            
            // Update tab completion
            updateTabs();
        }

        // Update Tabs
        function updateTabs() {
            const tabs = document.querySelectorAll('.tab');
            tabs.forEach((tab, index) => {
                tab.classList.remove('active', 'completed');
                
                if (index === currentSection) {
                    tab.classList.add('active');
                }
                
                // Check if section is completed
                if (index < dimensions.length) {
                    const dimId = dimensions[index].id;
                    const dimension = dimensions[index];
                    const dimResponses = responses[dimId] || {};
                    
                    if (Object.keys(dimResponses).length === dimension.questions.length) {
                        tab.classList.add('completed');
                    }
                }
            });
        }

        // Update Progress
        function updateProgress() {
            let totalQuestions = 0;
            let answeredQuestions = 0;
            
            dimensions.forEach(dim => {
                totalQuestions += dim.questions.length;
                const dimResponses = responses[dim.id] || {};
                answeredQuestions += Object.keys(dimResponses).length;
            });
            
            const progress = Math.round((answeredQuestions / totalQuestions) * 100);
            
            document.getElementById('progressPercent').textContent = `${progress}%`;
            document.getElementById('progressBar').style.width = `${progress}%`;
            
            // Update summary if on summary page
            if (currentSection === dimensions.length) {
                updateSummary();
            }
        }

        // Update Summary
        function updateSummary() {
            const completedCount = Object.keys(sectionScores).length;
            document.getElementById('completed-count').textContent = `${completedCount}/12`;
            
            // Calculate overall score
            if (completedCount > 0) {
                const scores = Object.values(sectionScores);
                const overallScore = Math.round(scores.reduce((a, b) => a + b, 0) / scores.length);
                
                document.getElementById('overall-score').textContent = overallScore;
                
                let status = '';
                let cardClass = '';
                if (overallScore >= 80) {
                    status = 'Excellent Performance';
                    cardClass = 'success';
                } else if (overallScore >= 60) {
                    status = 'Good - Need Improvement';
                    cardClass = 'warning';
                } else {
                    status = 'Critical - Urgent Action';
                    cardClass = 'danger';
                }
                
                document.getElementById('overall-status').textContent = status;
                document.getElementById('overall-card').className = `summary-card ${cardClass}`;
            }
            
            // Render dimension scores
            const listContainer = document.getElementById('dimension-scores-list');
            listContainer.innerHTML = '';
            
            dimensions.forEach(dim => {
                const score = sectionScores[dim.id] || 0;
                const item = document.createElement('div');
                item.className = 'dimension-item';
                
                let scoreClass = '';
                if (score >= 80) scoreClass = 'success';
                else if (score >= 60) scoreClass = 'warning';
                else scoreClass = 'danger';
                
                item.innerHTML = `
                    <span class="dimension-name">${dim.emoji} ${dim.title}</span>
                    <span class="dimension-score" style="color: var(--${scoreClass})">${score || '-'}</span>
                `;
                
                listContainer.appendChild(item);
            });
        }

        // Navigation
        function goToSection(index) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(`section-${index}`).classList.add('active');
            currentSection = index;
            updateTabs();
            
            if (index === dimensions.length) {
                updateSummary();
            }
            
            // Scroll to top
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function nextSection() {
            if (currentSection < dimensions.length) {
                goToSection(currentSection + 1);
            }
        }

        function previousSection() {
            if (currentSection > 0) {
                goToSection(currentSection - 1);
            }
        }

        // Decision Selection
        let selectedDecision = null;
        function selectDecision(decision) {
            selectedDecision = decision;
            document.querySelectorAll('.decision-btn').forEach(btn => {
                btn.classList.remove('selected');
            });
            event.target.classList.add('selected');
        }

        // Submit Form
        async function submitForm() {
            const storeCode    = document.getElementById('storeSelect').value;
            const tsh          = document.getElementById('tshField').value;
            const filledBy     = document.getElementById('filledBy').value;
            const assessmentDate = document.getElementById('assessmentDate').value;

            if (!storeCode || !filledBy || !assessmentDate) {
                alert('Lengkapi: Nama Store, Diisi Oleh, dan Tanggal!');
                return;
            }

            const store = STORES.find(s => s.code === storeCode);
            const storeName = store ? store.name : storeCode;

            const completedCount = Object.keys(sectionScores).length;
            if (completedCount < 12) {
                const ok = window.confirm(`Baru ${completedCount}/12 dimensi diisi. Submit sekarang?`);
                if (!ok) return;
            }

            const submitBtn = event.target;
            const originalText = submitBtn.textContent;
            submitBtn.textContent = '⏳ Menyimpan...';
            submitBtn.disabled = true;

            // Map section scores → dim fields expected by Code.gs
            const dimKeys = [
                'dim1_location','dim2_visibility','dim3_financial','dim4_product_mix',
                'dim5_people','dim6_promo','dim7_digital','dim8_store_activity',
                'dim9_traffic','dim10_competitor','dim11_customer','dim12_operational'
            ];
            const dimPayload = {};
            dimensions.forEach((dim, i) => {
                dimPayload[dimKeys[i]] = sectionScores[dim.id] || 0;
            });

            // Overall score & status — use computed values
            const scores = Object.values(sectionScores);
            const overallScore = scores.length
                ? Math.round(scores.reduce((a,b) => a+b, 0) / scores.length)
                : 0;
            const status   = overallScore >= 80 ? 'Excellent' : overallScore >= 60 ? 'Good' : 'Critical';
            const decision = selectedDecision
                ? selectedDecision.toUpperCase()
                : (overallScore >= 80 ? 'KEEP' : overallScore >= 60 ? 'IMPROVE' : overallScore >= 40 ? 'RELOCATE' : 'CLOSE');

            const payload = {
                store_code: storeCode,
                store_name: storeName,
                tsh,
                filled_by: filledBy,
                assessment_date: assessmentDate,
                ...dimPayload,
                overall_score: overallScore,
                status,
                decision,
                detailed_responses: responses
            };

            try {
                const res  = await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const json = await res.json();

                if (json.success) {
                    alert(`✅ Health Check berhasil disimpan!\n\nToko: ${storeName}\nSkor: ${overallScore}/100\nStatus: ${status}\nDecision: ${decision}\n\nData tampil di ERA-ANALYTICS → Store Analytics.`);
                    localStorage.removeItem('healthCheckData');
                    if (window.confirm('Mulai assessment baru?')) {
                        location.reload();
                    } else {
                        submitBtn.textContent = '✓ Tersimpan';
                        submitBtn.style.background = 'var(--success)';
                    }
                } else {
                    throw new Error(json.error || 'Server error');
                }

            } catch (error) {
                console.error('Submission error:', error);
                alert(`⚠️ Gagal menyimpan: ${error.message}\n\nCoba refresh dan submit ulang.`);
                submitBtn.textContent = originalText;
                submitBtn.disabled = false;
            }
        }

        // LocalStorage Management
        function saveToLocalStorage() {
            const data = {
                responses,
                sectionScores,
                storeCode:      document.getElementById('storeSelect').value,
                filledBy:       document.getElementById('filledBy').value,
                assessmentDate: document.getElementById('assessmentDate').value
            };
            localStorage.setItem('healthCheckData', JSON.stringify(data));
        }

        function loadFromLocalStorage() {
            const saved = localStorage.getItem('healthCheckData');
            if (!saved) return;
            const data = JSON.parse(saved);
            responses     = data.responses     || {};
            sectionScores = data.sectionScores || {};

            if (data.storeCode) {
                document.getElementById('storeSelect').value = data.storeCode;
                onStoreChange();
            }
            if (data.filledBy)       document.getElementById('filledBy').value       = data.filledBy;
            if (data.assessmentDate) document.getElementById('assessmentDate').value = data.assessmentDate;

            // Restore radio selections
            Object.keys(responses).forEach(dimId => {
                Object.keys(responses[dimId]).forEach(qId => {
                    const value = responses[dimId][qId];
                    const input = document.querySelector(`input[name="${dimId}_${qId}"][value="${value}"]`);
                    if (input) {
                        input.checked = true;
                        input.closest('.radio-option').classList.add('selected');
                    }
                });
                calculateSectionScore(parseInt(dimId));
            });

            updateProgress();
            updateTabs();
        }
    </script>
